# Simulation configuration (TOML).
# NOTE: keys MUST live in their sections ([agents], [environment.locations]) -
# ConfigFile.java looks them up as "agents.child" etc.; top-level keys are ignored.

[agents]
# One child per SES category (Welfare, Working, Professional).
child = 3
max_siblings = 0
percent_single_parents = 100.0
# age_start == age_finish simulates exactly one year (365 days),
# matching the paper's one-year benchmark (Table 6).
age_start = 3
age_finish = 3

[environment.locations]
utterances = "./resources/utterances"
books = "./resources/books"

# qty = average words spoken to the child per day (Hart & Risley daily totals).
# This is how the codebase realises the SES exposure gradient
# (approx. Welfare 5 / Working 10 / Professional 17 transcripts per day).
[[ses]]
name = "Welfare"
qty = 8767

[[ses]]
name = "Working"
qty = 17514

[[ses]]
name = "Professional"
qty = 30142
