# SCENARIO: autism-spectrum child profile (DEMONSTRATION PARAMETERS)
#
# IMPORTANT: the parameter values below are PLACEHOLDERS that demonstrate
# the mechanism (reduced attention to the social/spoken channel, relatively
# stronger visual/print channel, more repetition needed for spoken words).
# The actual values are a research decision - calibrate them with the
# research team / literature (TalkBank's ASDBank corpora can help) before
# drawing any conclusions from this scenario.
#
# Run with:  ./gradlew run -Pconf=scenarios/autism_demo.conf

[agents]
max_siblings = 0
percent_single_parents = 100.0
age_start = 3
age_finish = 3

[environment.locations]
utterances = "./resources/utterances"
books = "./resources/books"

[[ses]]
name = "Welfare"
qty = 8767

[[ses]]
name = "Working"
qty = 17514

[[ses]]
name = "Professional"
qty = 30142

[[child_profile]]
name = "typical"
count = 3

[[child_profile]]
name = "autistic_demo"
count = 3
attentiveness_heard = 0.4   # reduced attention to spoken/social input
attentiveness_seen = 1.0    # visual channel unaffected
threshold_heard = 30        # spoken words need more repetitions to stick
threshold_seen = 20
threshold_both = 12
