# BASELINE SCENARIO
# Reproduces the paper's setting: one typical child per SES group, one
# simulated year, school book reading only (no books at home).
# Run with:  ./gradlew run -Pconf=scenarios/baseline.conf

[agents]
child = 3
max_siblings = 0
percent_single_parents = 100.0
age_start = 3
age_finish = 3

[environment.locations]
utterances = "./resources/utterances"
books = "./resources/books"

# qty = average words spoken to the child per day (Hart & Risley).
[[ses]]
name = "Welfare"
qty = 8767

[[ses]]
name = "Working"
qty = 17514

[[ses]]
name = "Professional"
qty = 30142

# No [[child_profile]] / [[parent_profile]] / [[home_profile]] sections:
# defaults apply (typical children, standard parents, no books at home),
# which is exactly the original model's behaviour.
