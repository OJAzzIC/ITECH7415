# SCENARIO: typical vs inattentive children
# Six children: in each SES group, one typical child and one inattentive
# child (attends to only half the words it hears or sees).  Identical
# classroom for everyone, so differences are attributable to the child
# profile and the home.
# Run with:  ./gradlew run -Pconf=scenarios/mixed_children.conf

[agents]
max_siblings = 0
percent_single_parents = 100.0
age_start = 3
age_finish = 3

[environment.locations]
utterances = "./resources/utterances"
books = "./resources/books"

[[ses]]
name = "Welfare"
qty = 8767

[[ses]]
name = "Working"
qty = 17514

[[ses]]
name = "Professional"
qty = 30142

# Children are created in profile order: child1-3 = typical,
# child4-6 = inattentive.  SES is assigned round-robin across households,
# so each SES gets one child of each profile (labels are in the output CSV
# either way).
[[child_profile]]
name = "typical"
count = 3
attentiveness = 1.0

[[child_profile]]
name = "inattentive"
count = 3
attentiveness = 0.5
