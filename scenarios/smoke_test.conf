# SMOKE TEST - exercises every scenario feature in a 5-day run (~1 minute).
# Use this to verify the machinery after code changes; the numbers it
# produces are NOT meaningful results.
# Run with:  ./gradlew run -Pconf=scenarios/smoke_test.conf

[agents]
max_siblings = 0
percent_single_parents = 100.0
age_start = 3
age_finish = 3
days_per_year = 5

[environment.locations]
utterances = "./resources/utterances"
books = "./resources/books"

[[ses]]
name = "Welfare"
qty = 8767

[[ses]]
name = "Working"
qty = 17514

[[ses]]
name = "Professional"
qty = 30142

[[child_profile]]
name = "typical"
count = 2

[[child_profile]]
name = "inattentive"
count = 2
attentiveness = 0.5

[[child_profile]]
name = "autistic_demo"
count = 2
attentiveness_heard = 0.4
attentiveness_seen = 1.0
threshold_heard = 30

[[utterance_pool]]
name = "esl_demo"
path = "./resources/utterances_esl"

[[parent_profile]]
name = "standard"
pool = "default"

[[parent_profile]]
name = "esl_demo"
pool = "esl_demo"
daily_words_factor = 0.9

[[home_profile]]
name = "no_books"
books_per_day = 0

[[home_profile]]
name = "two_books"
books_per_day = 2
