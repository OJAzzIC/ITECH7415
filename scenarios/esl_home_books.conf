# SCENARIO: ESL parents x home reading
# Six households crossing two parent types with three home environments:
#   parent profiles (round-robin): standard, esl_demo
#   home profiles  (round-robin): no_books, one_book, three_books
# The esl_demo parent speaks from a restricted-vocabulary utterance pool
# (top 2,000 word types of the main corpus - regenerate or replace with a
# real CHILDES bilingual corpus for research use).
# Run with:  ./gradlew run -Pconf=scenarios/esl_home_books.conf

[agents]
max_siblings = 0
percent_single_parents = 100.0
age_start = 3
age_finish = 3

[environment.locations]
utterances = "./resources/utterances"
books = "./resources/books"

[[ses]]
name = "Welfare"
qty = 8767

[[ses]]
name = "Working"
qty = 17514

[[ses]]
name = "Professional"
qty = 30142

[[child_profile]]
name = "typical"
count = 6

[[utterance_pool]]
name = "esl_demo"
path = "./resources/utterances_esl"

[[parent_profile]]
name = "standard"
pool = "default"

[[parent_profile]]
name = "esl_demo"
pool = "esl_demo"

[[home_profile]]
name = "no_books"
books_per_day = 0

[[home_profile]]
name = "one_book"
books_per_day = 1

[[home_profile]]
name = "three_books"
books_per_day = 3
